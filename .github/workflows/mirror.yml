name: Generic Mirror (All Inputs)

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: "Source repo (github.com/org/repo.git)"
        required: true

      source_branch:
        description: "Source branch"
        required: true
        default: "main"

      source_username:
        description: "Source username"
        required: true

      source_token:
        description: "Source token"
        required: true

      target_repo:
        description: "Target repo (git.assembla.com/... or github.com/...)"
        required: true

      target_branch:
        description: "Target branch"
        required: true
        default: "main"

      target_username:
        description: "Target username"
        required: true

      target_token:
        description: "Target token"
        required: true

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Install Git
        run: sudo apt-get update && sudo apt-get install -y git

      - name: Clone source repository
        run: |
          git clone https://${{ github.event.inputs.source_username }}:${{ github.event.inputs.source_token }}@${{ github.event.inputs.source_repo }} repo
          cd repo
          git checkout ${{ github.event.inputs.source_branch }}

      - name: Configure Git
        run: |
          git config --global user.name "ci-bot"
          git config --global user.email "ci@example.com"

      - name: Setup target credentials securely
        run: |
          cat <<EOF > ~/.git-credentials
          https://${{ github.event.inputs.target_username }}:${{ github.event.inputs.target_token }}@${{ github.event.inputs.target_repo }}
          EOF
          git config --global credential.helper store

      - name: Add target remote
        run: |
          cd repo
          git remote add target https://${{ github.event.inputs.target_repo }}

      - name: Fetch target
        run: |
          cd repo
          git fetch target || true

      - name: Push mirror
        run: |
          cd repo
          git push target \
            ${{ github.event.inputs.source_branch }}:${{ github.event.inputs.target_branch }} \
            --force
