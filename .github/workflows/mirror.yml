name: Mirror Repository

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: "Source branch"
        required: true
        default: "main"

      target_branch:
        description: "Target branch"
        required: true
        default: "main"

      target_repo_url:
        description: "Target repo (github.com/org/repo.git)"
        required: true

      target_username:
        description: "Git username"
        required: true

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "ci-bot"
          git config --global user.email "ci@example.com"

      - name: Set up credentials securely
        run: |
          cat <<EOF > ~/.git-credentials
          https://${{ github.event.inputs.target_username }}:${{ secrets.TARGET_TOKEN }}@${{ github.event.inputs.target_repo_url }}
          EOF
          git config --global credential.helper store

      - name: Add target remote
        run: |
          git remote add target https://${{ github.event.inputs.target_repo_url }}

      - name: Fetch target
        run: |
          git fetch target || true

      - name: Check if branch exists
        run: |
          if git ls-remote --heads target ${{ github.event.inputs.target_branch }} | grep -q ${{ github.event.inputs.target_branch }}; then
            echo "Target branch exists"
          else
            echo "Target branch will be created"
          fi

      - name: Push mirror
        run: |
          git push target \
            ${{ github.event.inputs.source_branch }}:${{ github.event.inputs.target_branch }} \
            --force
