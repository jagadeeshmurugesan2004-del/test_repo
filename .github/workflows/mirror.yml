name: Mirror Repository

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: "Source branch"
        required: true
        default: "main"

      target_branch:
        description: "Target branch"
        required: true
        default: "test"

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Install Git
        run: sudo apt-get update && sudo apt-get install -y git

      - name: Clone from Assembla (source)
        run: |
          git clone https://${{ secrets.ASSEMBLA_USERNAME }}:${{ secrets.ASSEMBLA_TOKEN }}@git.assembla.com/jagadeesh12/Test.test.git repo
          cd repo
          git checkout ${{ github.event.inputs.source_branch }}

      - name: Configure Git
        run: |
          git config --global user.name "ci-bot"
          git config --global user.email "ci@example.com"

      - name: Setup target credentials securely
        run: |
          cat <<EOF > ~/.git-credentials
          https://${{ secrets.TARGET_USERNAME }}:${{ secrets.TARGET_TOKEN }}@github.com/ORG/REPO.git
          EOF
          git config --global credential.helper store

      - name: Add target remote
        run: |
          cd repo
          git remote add target https://github.com/ORG/REPO.git

      - name: Fetch target
        run: |
          cd repo
          git fetch target || true

      - name: Push mirror
        run: |
          cd repo
          git push target \
            ${{ github.event.inputs.source_branch }}:${{ github.event.inputs.target_branch }} \
            --force
